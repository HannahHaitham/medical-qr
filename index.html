<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical QR Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="script.js"></script>
</head>

<body>

  <!-- PROFILE PANEL -->
  <div id="profilePanel">
    <h3 id="profilePanelTitle">Profile Settings</h3>

    <div class="language-container">
      <label for="languageSelect">Language:</label>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="ar">العربية</option>
        <option value="de">Deutsch</option>
      </select>
    </div>

    <div class="toggle-container">
      <!-- Moon icon visible in light mode -->
      <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#555" width="24" height="24">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
      <!-- Toggle switch -->
      <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>
      <!-- Sun icon hidden in light mode -->
      <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#f5d547" width="24" height="24">
        <circle cx="12" cy="12" r="5" />
        <g stroke="#f5d547" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </g>
      </svg>
    </div>
  </div>

  <!-- Profile Button -->
  <button class="profile-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png"
      class="profile-pic" alt="Profile">
  </button>

  <div class="container">

    <!-- Top-right buttons -->
    <div class="top-buttons">
      <button id="editBtn" title="Edit Info" class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1da1f2" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" />
        </svg>
      </button>

      <button id="deleteBtn" title="Delete Info" class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1da1f2" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
          <path d="M10 11v6" />
          <path d="M14 11v6" />
        </svg>
      </button>
    </div>

    <h2 id="formTitle">Medical Information QR Code</h2>

    <form id="medicalForm">
      <label for="name" id="labelName">Full Name:</label>
      <input type="text" id="name" placeholder="Full Name">

      <label for="age" id="labelAge">Age:</label>
      <input type="number" id="age" placeholder="Age">

      <label for="allergiesYesNo" id="labelAllergies">Allergies:</label>
      <select id="allergiesYesNo">
        <option>No</option>
        <option>Yes</option>
      </select>
      <textarea id="allergies" placeholder="Specify allergies"></textarea>

      <label for="blood" id="labelBlood">Blood Type:</label>
      <select id="blood">
        <option value="">Select Blood Type</option>
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>AB+</option>
        <option>AB-</option>
        <option>O+</option>
        <option>O-</option>
      </select>

      <label for="diabetes" id="labelDiabetes">Diabetes:</label>
      <select id="diabetes">
        <option>No</option>
        <option>Yes</option>
      </select>
      <select id="diabetesType" style="display:none;">
        <option>Type 1</option>
        <option>Type 2</option>
        <option>Gestational</option>
      </select>

      <label for="highBP" id="labelHighBP">High Blood Pressure:</label>
      <select id="highBP">
        <option>No</option>
        <option>Yes</option>
      </select>

      <label for="lowBP" id="labelLowBP">Low Blood Pressure:</label>
      <select id="lowBP">
        <option>No</option>
        <option>Yes</option>
      </select>

      <label for="strokeHistory" id="labelStroke">History of Strokes:</label>
      <select id="strokeHistory">
        <option>No</option>
        <option>Self</option>
        <option>Family Member</option>
      </select>

      <label for="DNR" id="labelDNR">DNR:</label>
      <select id="DNR">
        <option>No</option>
        <option>Yes</option>
      </select>

      <label for="organDonor" id="labelOrganDonor">Organ Donor:</label>
      <select id="organDonor">
        <option>No</option>
        <option>Yes</option>
      </select>

      <label for="medicine" id="labelMedicine">Medicine Taken:</label>
      <textarea id="medicine" placeholder="Medicines you take"></textarea>

      <label for="asthma" id="labelAsthma">Asthma:</label>
      <select id="asthma">
        <option>No</option>
        <option>Mild</option>
        <option>Moderate</option>
        <option>Severe</option>
      </select>

      <label for="smoke" id="labelSmoke">Do you smoke?</label>
      <select id="smoke">
        <option>No</option>
        <option>Yes</option>
      </select>
      <input type="text" id="smokeFrequency" placeholder="How many packs/day" style="display:none;">

      <label for="epilepsy" id="labelEpilepsy">Epilepsy:</label>
      <select id="epilepsy">
        <option>No</option>
        <option>Yes</option>
      </select>
      <select id="epilepsyType" style="display:none;">
        <option>Focal</option>
        <option>Generalized</option>
        <option>Unknown</option>
      </select>

      <label for="notes" id="labelNotes">Notes:</label>
      <textarea id="notes" placeholder="Other notes"></textarea>

      <label for="emergencyContact" id="labelEmergency">Emergency Contact:</label>
      <input type="text" id="emergencyContact" placeholder="Emergency contact number">
    </form>

    <button type="button" id="confirmBtn">Confirm Info</button>

    <div id="qrcode"></div>
    <button type="button" id="downloadBtn" style="display:none;">Download QR Code</button>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
      <div class="modal-content">
        <p id="deleteModalText">Are you sure you want to delete your info?</p>
        <div class="modal-buttons">
          <button id="cancelDelete">Cancel</button>
          <button id="confirmDelete">Delete</button>
        </div>
      </div>
    </div>

  </div>

</body>

</html>
