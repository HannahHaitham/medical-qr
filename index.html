<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medical QR Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <h2>Medical Information QR Code</h2>

    <form id="medicalForm">
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="age" placeholder="Age">
      <input type="text" id="blood" placeholder="Blood Type">
      <input type="text" id="allergies" placeholder="Allergies">
      <input type="text" id="doctor" placeholder="Doctor Phone">
      <textarea id="notes" placeholder="Other Notes"></textarea>
    </form>

    <div id="qrcode"></div>

    <div class="button-container">
      <button type="button" id="generateBtn">Generate QR Code</button>
      <button type="button" id="downloadBtn" style="display:none;">Download QR Code</button>
    </div>
  </div>
</body>
</html>
