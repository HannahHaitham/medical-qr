<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical QR Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="script.js"></script>
</head>
<body>

  <!-- PROFILE PANEL -->
  <div id="profilePanel">
    <h3>Profile Settings</h3>
    <div class="toggle-container">
      <!-- Moon icon visible in light mode -->
      <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#555" width="24" height="24">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>

      <!-- Toggle switch -->
      <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>

      <!-- Sun icon hidden in light mode -->
      <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#f5d547" width="24" height="24">
        <circle cx="12" cy="12" r="5"/>
        <g stroke="#f5d547" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </g>
      </svg>
    </div>
  </div>

  <!-- Profile Button -->
  <button class="profile-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png" class="profile-pic" alt="Profile">
  </button>

  <div class="container">

    <!-- Top-right buttons -->
    <div class="top-buttons">
      <button id="editBtn" title="Edit Info" class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1da1f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
        </svg>
      </button>

      <button id="deleteBtn" title="Delete Info" class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1da1f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
        </svg>
      </button>
    </div>

    <h2>Medical Information QR Code</h2>

    <form id="medicalForm">
      <!-- Most important fields first -->
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="number" id="age" placeholder="Age" min="0">
    
      <!-- Allergies Yes/No -->
      <label>Do you have allergies?</label>
      <select id="allergiesYesNo">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
      <textarea id="allergies" placeholder="List your allergies" style="display:none;"></textarea>
    
      <!-- Blood type dropdown -->
      <label>Blood Type</label>
      <select id="blood">
        <option value="">Select</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
      </select>
    
      <!-- Yes/No medical questions -->
      <label>Diabetes?</label>
      <select id="diabetes">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <label>High Blood Pressure?</label>
      <select id="highBP">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <label>Low Blood Pressure?</label>
      <select id="lowBP">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <label>History of Strokes?</label>
      <select id="strokeHistory">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <label>DNR (Do Not Resuscitate)?</label>
      <select id="DNR">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <label>Organ Donor?</label>
      <select id="organDonor">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <input type="text" id="medicine" placeholder="Medicine You Take">
    
      <label>Asthma?</label>
      <select id="asthma">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <label>Do you smoke?</label>
      <select id="smoke">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <label>Epilepsy?</label>
      <select id="epilepsy">
        <option value="">Select</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    
      <input type="text" id="emergencyContact" placeholder="Emergency Contact">
    
      <textarea id="notes" placeholder="Other Notes"></textarea>
    </form>

    <button type="button" id="confirmBtn">Confirm Info</button>

    <div id="qrcode"></div>
    <button type="button" id="downloadBtn" style="display:none;">Download QR Code</button>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
      <div class="modal-content">
        <p>Are you sure you want to delete your info?</p>
        <div class="modal-buttons">
          <button id="cancelDelete">Cancel</button>
          <button id="confirmDelete">Delete</button>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
