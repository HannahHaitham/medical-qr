<body>
  <div class="container">
    <h2>Medical Information QR Code</h2>

    <!-- Form to generate QR code -->

      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="age" placeholder="Age">
      <input type="text" id="blood" placeholder="Blood Type">
      <input type="text" id="allergies" placeholder="Allergies">
      <input type="text" id="doctor" placeholder="Doctor Phone">
      <textarea id="notes" placeholder="Other Notes"></textarea>
      <button type="button" id="generateBtn">Generate QR Code</button>
