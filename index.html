<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medical QR</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="app-home">

  <div class="app-container">

    <!-- Logo -->
    <div class="app-icon">
      <img src="logo-light.png" id="homeLogo">
    </div>

    <!-- Title -->
    <h1>Medical QR</h1>
    <p class="subtitle">Your emergency medical profile</p>

    <p id="lastNameText" class="last-name"></p>

    <!-- Start Button -->
    <button class="primary-btn" id="startBtn">
      Create QR
    </button>

    <!-- Continue Button -->
    <button class="secondary-btn" id="continueBtn">
      Continue Last Profile
    </button>

    <!-- Small text -->
    <p class="trust-text">Your data is private and securely stored</p>

  </div>

  <script src="home.js"></script>

</body>
</html>
