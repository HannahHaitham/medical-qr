<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical QR Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="script.js"></script>
</head>
<body>

  <!-- PROFILE PANEL -->
  <div id="profilePanel">
    <h3>Profile Settings</h3>
    <div class="toggle-container">
      <img id="sunIcon" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/White_sun_icon.svg" alt="Sun">
      <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>
      <img id="moonIcon" src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Crescent_moon_icon.svg" alt="Moon">
    </div>
  </div>

  <!-- Profile Button -->
  <button class="profile-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png" class="profile-pic" alt="Profile">
  </button>

  <div class="container">

    <!-- Top-right buttons -->
    <div class="top-buttons">
      <button id="editBtn" title="Edit Info" class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1da1f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
        </svg>
      </button>

      <button id="deleteBtn" title="Delete Info" class="icon-btn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#1da1f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
        </svg>
      </button>
    </div>

    <h2>Medical Information QR Code</h2>

    <form id="medicalForm">
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="age" placeholder="Age">
      <input type="text" id="blood" placeholder="Blood Type">
      <input type="text" id="allergies" placeholder="Allergies">
      <input type="text" id="doctor" placeholder="Doctor Phone">
      <textarea id="notes" placeholder="Other Notes"></textarea>
    </form>

    <button type="button" id="confirmBtn">Confirm Info</button>

    <div id="qrcode"></div>
    <button type="button" id="downloadBtn" style="display:none;">Download QR Code</button>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
      <div class="modal-content">
        <p>Are you sure you want to delete your info?</p>
        <div class="modal-buttons">
          <button id="cancelDelete">Cancel</button>
          <button id="confirmDelete">Delete</button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
