<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Info</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <!-- Profile Panel -->
  <div id="profilePanel">
    <h3>Profile</h3>

    <button class="profile-btn">
      <img class="profile-pic" src="profile-placeholder.png" alt="Profile">
    </button>

    <div class="toggle-container">
      <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#f5d547" width="24" height="24">
        <circle cx="12" cy="12" r="5"/>
        <g stroke="#f5d547" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </g>
      </svg>

      <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ffffff" width="24" height="24">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>

      <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="container">
    <h2>Medical Info</h2>
    <div id="displayInfo"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC1ZgCCR-MakYRbA6Vw9I7QYWmITuOLC2M",
      authDomain: "medical-qr-50da9.firebaseapp.com",
      projectId: "medical-qr-50da9",
      storageBucket: "medical-qr-50da9.firebasestorage.app",
      messagingSenderId: "918654903799",
      appId: "1:918654903799:web:fa0d014fb068cb4f993af2",
      measurementId: "G-KEXK6MYLLC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const displayDiv = document.getElementById("displayInfo");
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      displayDiv.innerHTML = "<p>No medical ID provided.</p>";
    } else {
      getDoc(doc(db, "medicalProfiles", id)).then(docSnap => {
        if (!docSnap.exists()) {
          displayDiv.innerHTML = "<p>No medical info found.</p>";
          return;
        }
        const data = docSnap.data();
        displayDiv.innerHTML = `
          <div class="info-card">
            <h3>Medical Information</h3>
            <p><strong>Name:</strong> ${data.name}</p>
            <p><strong>Age:</strong> ${data.age}</p>
            <p><strong>Blood Type:</strong> ${data.blood}</p>
            <p><strong>Allergies:</strong> ${data.allergies}</p>
            <p><strong>Doctor:</strong> ${data.doctor}</p>
            <p><strong>Notes:</strong> ${data.notes}</p>
          </div>
        `;
      }).catch(err => {
        console.error(err);
        displayDiv.innerHTML = "<p>Error loading medical info.</p>";
      });
    }

    // Profile panel toggle
    const profileBtn = document.querySelector(".profile-btn");
    const profilePanel = document.getElementById("profilePanel");
    const darkModeToggle = document.getElementById("darkModeToggle");
    const sunIcon = document.getElementById("sunIcon");
    const moonIcon = document.getElementById("moonIcon");

    profileBtn.addEventListener("click", () => {
      if (profilePanel.style.left === "0px") {
        profilePanel.style.left = "-260px";
      } else {
        profilePanel.style.left = "0px";
      }
    });

    // Dark mode toggle
    if (localStorage.getItem("darkMode") === "enabled") {
      document.body.classList.add("dark-mode");
      darkModeToggle.checked = true;
      sunIcon.style.display = "none";
      moonIcon.style.display = "block";
    } else {
      sunIcon.style.display = "block";
      moonIcon.style.display = "none";
    }

    darkModeToggle.addEventListener("change", () => {
      if (darkModeToggle.checked) {
        document.body.classList.add("dark-mode");
        localStorage.setItem("darkMode", "enabled");
        sunIcon.style.display = "none";
        moonIcon.style.display = "block";
      } else {
        document.body.classList.remove("dark-mode");
        localStorage.setItem("darkMode", "disabled");
        sunIcon.style.display = "block";
        moonIcon.style.display = "none";
      }
    });
  </script>
</body>
</html>
